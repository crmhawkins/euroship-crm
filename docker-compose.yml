services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: euroship-crm:latest
    container_name: euroship_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_NAME: "Euroship CRM"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8000}
      APP_KEY: ${APP_KEY}
      APP_LOCALE: es
      APP_FALLBACK_LOCALE: en
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: euroship_crm
      DB_USERNAME: euroship
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stack
      LOG_STACK: single
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

  db:
    image: mysql:8.0
    container_name: euroship_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: euroship_crm
      MYSQL_USER: euroship
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  app_storage:
